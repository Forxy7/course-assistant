const DAYS = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
const WEEKS_TOTAL = 18;
// 开学日期: 2026-03-02
const SEMESTER_START = new Date(2026, 2, 2);

function getCurrentWeek() {
  const now = new Date();
  const diff = (now - SEMESTER_START) / (1000*60*60*24);
  return Math.max(1, Math.floor(diff / 7) + 1);
}

function getDayName(date) {
  return DAYS[date.getDay()];
}

function inWeek(weekSpec, weekNum) {
  for (const part of weekSpec.split(",")) {
    const p = part.trim();
    if (p.includes("-")) {
      const [a, b] = p.split("-").map(Number);
      if (weekNum >= a && weekNum <= b) return true;
    } else if (Number(p) === weekNum) return true;
  }
  return false;
}

function getCourses(dayName, weekNum) {
  return SCHEDULE.course_list.filter(c => c.d === dayName && inWeek(c.w, weekNum));
}

function formatCourses(courses) {
  if (!courses.length) return "今天没有课";
  return courses.sort((a,b)=>a.s.localeCompare(b.s)).map(c => `${c.s}-${c.e}  ${c.n} @ ${c.l}`).join("\n");
}

function getAllCourseNames() {
  return [...new Set(SCHEDULE.course_list.map(c => c.n))];
}

function getWeekTasks(weekNum) {
  return SCHEDULE.course_list.filter(c => c.n.includes("实验") && inWeek(c.w, weekNum)).map(c => `${c.n}（${c.d} ${c.s}，${c.l}）`);
}

// ── DeepSeek API ──
const API_KEY = "sk-3bda8aa6238d4e4a8d2c2d962efec207";
const API_URL = "https://api.deepseek.com/v1/chat/completions";

const TOOLS = [
  {type:"function",function:{name:"get_today",description:"获取今天的课程",parameters:{type:"object",properties:{}}}},
  {type:"function",function:{name:"get_day",description:"获取指定星期几的课程",parameters:{type:"object",properties:{day:{type:"string",description:"如星期一"}},required:["day"]}}},
  {type:"function",function:{name:"get_week_courses",description:"获取本周全部课程",parameters:{type:"object",properties:{}}}},
  {type:"function",function:{name:"get_tasks",description:"获取本周实验任务",parameters:{type:"object",properties:{}}}},
  {type:"function",function:{name:"get_courses",description:"获取本学期所有课程名称",parameters:{type:"object",properties:{}}}},
];

async function callDeepSeek(messages) {
  const r = await fetch(API_URL, {method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+API_KEY},body:JSON.stringify({
    model:"deepseek-chat",messages,tools:TOOLS,tool_choice:"auto",temperature:0.1,max_tokens:1024
  })});
  try {
    return await r.json();
  } catch(e) {
    const text = await r.text();
    throw new Error("HTTP "+r.status+": "+text.slice(0,200));
  }
}

function executeTool(name, args) {
  const week = getCurrentWeek();
  const now = new Date();
  switch(name) {
    case "get_today": {
      const dn = getDayName(now);
      const c = getCourses(dn, week);
      return {day:dn,courses:formatCourses(c),count:c.length};
    }
    case "get_day": {
      const c = SCHEDULE.course_list.filter(x => x.d === args.day);
      return {day:args.day,courses:formatCourses(c),count:c.length};
    }
    case "get_week_courses": {
      let lines = [];
      for (const dn of ["星期一","星期二","星期三","星期四","星期五","星期六","星期日"]) {
        const c = getCourses(dn, week);
        if (c.length) {
          lines.push("-- "+dn+" --");
          lines.push(formatCourses(c));
        }
      }
      return {courses:lines.join("\n")||"本周没有课"};
    }
    case "get_tasks": {
      return {tasks:getWeekTasks(week)};
    }
    case "get_courses": {
      return {courses:getAllCourseNames(),count:getAllCourseNames().length};
    }
  }
}

async function agent(userMsg) {
const todayStr = new Date().toLocaleDateString("zh-CN",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
const weekNum = getCurrentWeek();
const sysPrompt = "你是课表助手。今天是"+todayStr+"，第"+weekNum+"周。回答简洁直接，列出课程时间和地点。如果没课就说没课。";
const msgs = [{role:"system",content:sysPrompt},{role:"user",content:userMsg}];
  for (let i=0; i<5; i++) {
    const result = await callDeepSeek(msgs);
    if (result.error) return "API错误: "+result.error.message;
    if (!result.choices) return "API返回异常";
    const msg = result.choices[0].message;
    if (msg.tool_calls) {
      msgs.push(msg);
      for (const tc of msg.tool_calls) {
        const args = JSON.parse(tc.function.arguments||"{}");
        const output = executeTool(tc.function.name, args);
        msgs.push({role:"tool",tool_call_id:tc.id,content:JSON.stringify(output)});
      }
    } else {
      return msg.content||"";
    }
  }
  return "暂时无法回答";
}

// ── UI ──
function addMsg(text, role) {
  const d = document.getElementById("chat");
  const m = document.createElement("div");
  m.className = "msg "+role;
  m.textContent = text;
  d.appendChild(m);
  d.scrollTop = d.scrollHeight;
}

async function send() {
  const inp = document.getElementById("input");
  const btn = document.getElementById("send");
  const loading = document.getElementById("loading");
  const text = inp.value.trim();
  if (!text) return;
  addMsg(text, "user");
  inp.value = "";
  btn.disabled = true;
  loading.style.display = "block";
  try {
    const reply = await agent(text);
    addMsg(reply, "bot");
  } catch(e) {
    addMsg("出错了: "+e.message, "bot");
  }
  btn.disabled = false;
  loading.style.display = "none";
}

document.getElementById("input").addEventListener("keydown", e => { if(e.key==="Enter") send(); });
addMsg("你好！我是课表助手，试试问：\n今天有什么课？\n这周有什么实验？\n星期五的课？\n（注意：需要联网才能使用）", "bot");
